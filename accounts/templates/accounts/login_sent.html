{% extends "base.html" %}
{% block title %}Link enviado — CityClean{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-sm-10 col-md-6 col-lg-5 text-center">
      <i class="bi bi-envelope-check text-success" style="font-size:4rem;"></i>
      <h2 class="fw-bold mt-3">Verifique seu e-mail</h2>
      <p class="text-muted">
        Enviamos um link de acesso para <strong>{{ email }}</strong>.
        Clique nele para entrar (válido por 15 minutos).
      </p>
      <p class="small text-muted">Não recebeu? Verifique a pasta de spam.</p>
      <a href="{% url 'login' %}" class="btn btn-outline-success mt-2">Tentar novamente</a>
    </div>
  </div>
</div>
{% endblock %}
