{% extends "base.html" %}
{% block title %}Entrar — CityClean{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-sm-10 col-md-7 col-lg-5">
      <div class="card border-0 shadow-sm p-4">
        <div class="text-center mb-4">
          <i class="bi bi-recycle text-success" style="font-size:2.5rem;"></i>
          <h3 class="fw-bold mt-2">Acessar minha conta</h3>
          <p class="text-muted small">Informe seu e-mail e enviaremos um link de acesso seguro.</p>
        </div>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="post" novalidate>
          {% csrf_token %}
          <div class="mb-3">
            <label for="email" class="form-label fw-semibold">E-mail</label>
            <input type="email" id="email" name="email" class="form-control form-control-lg"
                   placeholder="seu@email.com" required autofocus>
          </div>
          <button type="submit" class="btn btn-success btn-lg w-100">
            <i class="bi bi-send me-1"></i> Enviar link de acesso
          </button>
        </form>

        <hr class="my-4">
        <p class="text-center mb-0 small">
          Não tem conta?
          <a href="{% url 'cadastro' %}" class="text-success fw-semibold">Cadastre-se grátis</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
